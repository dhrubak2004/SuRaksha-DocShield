services:
  - type: web
    name: docshield-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free

  - type: web
    name: docshield-frontend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/dashboard.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    plan: free
